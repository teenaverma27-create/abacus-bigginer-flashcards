<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abacus Flashcards Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #6dd5ed, #2193b0);
  overflow-x: hidden;
}

/* Floating shapes background */
body::before {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  background-image: radial-gradient(circle, rgba(255,255,255,0.2) 2px, transparent 2px);
  background-size: 40px 40px;
  z-index: -1;
}

.container {
  text-align: center;
  padding: 20px;
  color: white;
}

h1 {
  margin-bottom: 10px;
}

.controls {
  margin: 10px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  background: #ff9800;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #e68900;
}

.card {
  width: 300px;
  height: 340px;
  margin: 20px auto;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
  position: relative;
}

.flipped {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 15px;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.back {
  transform: rotateY(180deg);
  font-size: 50px;
  color: #333;
  font-weight: bold;
}

.abacus {
  display: flex;
  gap: 20px;
}

.rod {
  display: flex;
  flex-direction: column;
  align-items: center;
}

.bead {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  margin: 4px;
}

.upper { background: #444; }
.lower { background: #ff5722; }

.active {
  transform: translateY(8px);
}

.progress {
  margin-top: 10px;
}

.level-select {
  margin: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🧮 Abacus Flashcards</h1>

  <div class="level-select">
    <button onclick="setLevel(1)">Level 1</button>
    <button onclick="setLevel(2)">Level 2</button>
    <button onclick="setLevel(3)">Level 3</button>
  </div>

  <div class="card" onclick="flipCard()">
    <div class="inner" id="cardInner">
      <div class="face front" id="front"></div>
      <div class="face back" id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevCard()">Prev</button>
    <button onclick="nextCard()">Next</button>
    <button onclick="shuffle()">Shuffle</button>
  </div>

  <div class="progress" id="progress"></div>
</div>

<audio id="flipSound">
  <source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>
let level = 1;
let cards = [];
let current = 0;

function generateCards() {
  cards = [];

  if (level === 1) {
    for (let i = 0; i < 10; i++) cards.push(i);
  } else if (level === 2) {
    for (let i = 10; i < 30; i++) cards.push(i);
  } else {
    for (let i = 0; i < 25; i++) cards.push(Math.floor(Math.random()*50));
  }

  current = 0;
  renderCard();
}

function createRod(value) {
  let upper = value >= 5;
  let lowerCount = upper ? value - 5 : value;

  let lower = "";
  for (let i = 0; i < 4; i++) {
    lower += `<div class="bead lower ${i < lowerCount ? 'active':''}"></div>`;
  }

  return `
  <div class="rod">
    <div class="bead upper ${upper ? 'active':''}"></div>
    ${lower}
  </div>`;
}

function createAbacus(num) {
  let tens = Math.floor(num/10);
  let ones = num % 10;

  return `
  <div class="abacus">
    ${createRod(tens)}
    ${createRod(ones)}
  </div>`;
}

function renderCard() {
  let num = cards[current];
  document.getElementById("front").innerHTML = createAbacus(num);
  document.getElementById("back").innerText = num;
  document.getElementById("progress").innerText = `Card ${current+1} / ${cards.length}`;
  document.getElementById("cardInner").classList.remove("flipped");
}

function flipCard() {
  document.getElementById("cardInner").classList.toggle("flipped");
  document.getElementById("flipSound").play();
}

function nextCard() {
  current = (current + 1) % cards.length;
  renderCard();
}

function prevCard() {
  current = (current - 1 + cards.length) % cards.length;
  renderCard();
}

function shuffle() {
  cards.sort(() => Math.random() - 0.5);
  current = 0;
  renderCard();
}

function setLevel(l) {
  level = l;
  generateCards();
}

generateCards();
</script>

</body>
</html>
