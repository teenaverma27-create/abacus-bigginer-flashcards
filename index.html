<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Abacus Flashcards Pro</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  text-align: center;
}

.container {
  padding: 20px;
}

h1 {
  color: #333;
}

/* LEVEL COLORS */
.level1 { background: #4CAF50; }
.level2 { background: #2196F3; }
.level3 { background: #9C27B0; }

button {
  padding: 10px 14px;
  margin: 5px;
  border: none;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.controls button {
  background: #ff9800;
}

.card {
  width: 300px;
  height: 360px;
  margin: 20px auto;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flipped {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 15px;
  backface-visibility: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.back {
  transform: rotateY(180deg);
  font-size: 50px;
  font-weight: bold;
}

/* REAL ABACUS */
.abacus {
  display: flex;
  gap: 20px;
}

.rod {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
}

/* Beam line */
.beam {
  width: 40px;
  height: 4px;
  background: black;
  position: absolute;
  top: 60px;
}

.bead {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  margin: 3px;
  transition: transform 0.3s;
}

.upper { background: #444; }
.lower { background: #ff5722; }

.upper.active {
  transform: translateY(35px);
}

.lower.active {
  transform: translateY(-20px);
}

.timer {
  font-size: 18px;
  margin: 10px;
}

.progress {
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
  <h1>🧮 Abacus Flashcards</h1>

  <div>
    <button class="level1" onclick="setLevel(1)">Level 1</button>
    <button class="level2" onclick="setLevel(2)">Level 2</button>
    <button class="level3" onclick="setLevel(3)">Level 3</button>
  </div>

  <div class="card" onclick="flipCard()">
    <div class="inner" id="cardInner">
      <div class="face" id="front"></div>
      <div class="face back" id="back"></div>
    </div>
  </div>

  <div class="controls">
    <button onclick="prevCard()">Prev</button>
    <button onclick="nextCard()">Next</button>
    <button onclick="shuffle()">Shuffle</button>
    <button onclick="toggleAuto()">Auto</button>
  </div>

  <div class="timer" id="timer">Time: 0s</div>
  <div class="progress" id="progress"></div>
</div>

<audio id="sound">
  <source src="https://www.soundjay.com/buttons/sounds/button-09.mp3">
</audio>

<script>
let level = 1;
let cards = [];
let current = 0;
let time = 0;
let auto = null;

/* TIMER */
setInterval(()=>{
  time++;
  document.getElementById("timer").innerText = "Time: " + time + "s";
},1000);

/* LEVEL SET */
function setLevel(l){
  level = l;
  cards = [];

  if(l===1){
    for(let i=0;i<10;i++) cards.push(i);
  }else if(l===2){
    for(let i=10;i<30;i++) cards.push(i);
  }else{
    for(let i=0;i<25;i++) cards.push(Math.floor(Math.random()*50));
  }

  current=0;
  render();
}

/* ABACUS */
function rod(v){
  let up = v>=5;
  let low = up? v-5:v;

  let beads="";
  for(let i=0;i<4;i++){
    beads += `<div class="bead lower ${i<low?'active':''}"></div>`;
  }

  return `
  <div class="rod">
    <div class="bead upper ${up?'active':''}"></div>
    <div class="beam"></div>
    ${beads}
  </div>`;
}

function abacus(n){
  let t = Math.floor(n/10);
  let o = n%10;
  return `<div class="abacus">${rod(t)}${rod(o)}</div>`;
}

/* RENDER */
function render(){
  let n = cards[current];
  document.getElementById("front").innerHTML = abacus(n);
  document.getElementById("back").innerText = n;
  document.getElementById("progress").innerText = `Card ${current+1}/${cards.length}`;
  document.getElementById("cardInner").classList.remove("flipped");
}

/* ACTIONS */
function flipCard(){
  document.getElementById("cardInner").classList.toggle("flipped");
  document.getElementById("sound").play();
}

function nextCard(){
  current=(current+1)%cards.length;
  render();
}

function prevCard(){
  current=(current-1+cards.length)%cards.length;
  render();
}

function shuffle(){
  cards.sort(()=>Math.random()-0.5);
  current=0;
  render();
}

function toggleAuto(){
  if(auto){
    clearInterval(auto);
    auto=null;
  }else{
    auto=setInterval(nextCard,2000);
  }
}

setLevel(1);
</script>

</body>
</html>
